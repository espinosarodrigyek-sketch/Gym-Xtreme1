{% include 'partials/admin_base.html' %}

<div class="main-content">
<div style="max-width:500px;margin:0 auto;">
    <div class="card-dark">
        <div class="card-dark-header" style="text-align:center;">
            <i class="fas fa-user-shield" style="font-size:2rem;margin-bottom:8px;display:block;"></i>
            Crear Administrador
        </div>
        <div class="card-dark-body">
            {% if messages %}
            {% for message in messages %}
            <div class="alert-gym">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom:18px;">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-input" required>
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" required>
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Contrasena</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <button type="submit" class="btn-gym" style="width:100%;justify-content:center;padding:14px;">
                    <i class="fas fa-user-plus"></i> Crear Administrador
                </button>
                <a href="/admin-panel/" style="display:block;text-align:center;color:#666;margin-top:12px;text-decoration:none;padding:12px;border:1px solid #333;border-radius:8px;">Volver al Panel</a>
            </form>
        </div>
    </div>
</div>
</div>
