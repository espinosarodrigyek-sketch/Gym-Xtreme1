<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GYM XTREME</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --rojo-gym: #DC3545;
            --rojo-oscuro: #A71D2A;
            --negro-bg: #1A1A1A;
            --negro-card: #2D2D2D;
        }

        body {
            background: linear-gradient(135deg, var(--negro-bg) 0%, #0D0D0D 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .register-card {
            background: var(--negro-card);
            border-radius: 20px;
            border: 1px solid #3D3D3D;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .register-header {
            background: linear-gradient(135deg, var(--rojo-gym), var(--rojo-oscuro));
            padding: 40px 30px;
            text-align: center;
        }

        .register-header .icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .register-header .icon i {
            font-size: 2.5rem;
            color: white;
        }

        .register-header h2 {
            color: white;
            font-weight: 700;
            margin: 0;
            font-size: 1.8rem;
        }

        .register-header p {
            color: rgba(255, 255, 255, 0.8);
            margin: 10px 0 0;
            font-size: 0.95rem;
        }

        .register-body {
            padding: 35px 30px;
        }

        .form-label {
            color: #aaa;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background: #1A1A1A;
            border: 2px solid #3D3D3D;
            color: white;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: #1A1A1A;
            border-color: var(--rojo-gym);
            color: white;
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.15);
        }

        .form-control::placeholder {
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--rojo-gym), var(--rojo-oscuro));
            border: none;
            color: white;
            padding: 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #3D3D3D;
        }

        .divider span {
            padding: 0 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: var(--rojo-gym);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: white;
            text-decoration: underline;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .input-icon .form-control {
            padding-left: 45px;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid var(--rojo-gym);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .success-message {
            background: rgba(25, 135, 84, 0.15);
            border: 1px solid #198754;
            color: #6fcf97;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .dumbbell-icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="icon">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h2>ÚNETE A GYM XTREME</h2>
            <p>Transforma tu cuerpo hoy mismo</p>
        </div>

        <div class="register-body">
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                    </div>
                    {% else %}
                    <div class="success-message">
                        <i class="fas fa-check-circle me-2"></i>{{ message }}
                    </div>
                    {% endif %}
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user me-2"></i>Usuario
                    </label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" name="username" placeholder="Elige un nombre de usuario" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope me-2"></i>Correo Electrónico
                    </label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" name="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock me-2"></i>Contraseña
                    </label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" name="password" placeholder="Crea una contraseña segura" required>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus me-2"></i>Crear Cuenta
                </button>
            </form>

            <div class="divider">
                <span>o</span>
            </div>

            <div class="login-link">
                <p style="color: #888; margin-bottom: 10px;">¿Ya tienes cuenta?</p>
                <a href="{% url 'login' %}">
                    <i class="fas fa-sign-in-alt me-1"></i>Iniciar Sesión
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
