<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Gym Xtreme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --rojo: #DC3545; --negro: #111111; --negro-light: #1a1a1a; }
        body { background: var(--negro); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .card { background: var(--negro-light); border: 1px solid #333; border-radius: 15px; padding: 40px; }
        .icon { font-size: 4rem; color: var(--rojo); margin-bottom: 20px; }
        h1 { margin: 0 0 15px; }
        p { color: #ccc; margin-bottom: 25px; }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 25px; text-decoration: none; font-weight: 600; background: var(--rojo); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>Error</h1>
            <p>{{ error }}</p>
            <a href="/" class="btn">
                <i class="fas fa-home"></i> Volver al Inicio
            </a>
        </div>
    </div>
</body>
</html>
