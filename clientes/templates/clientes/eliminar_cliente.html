<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<body style="background-color:#0f0f0f;">

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header text-center text-white bg-danger">
<h3 class="fw-bold">ELIMINAR CLIENTE</h3>
</div>

<div class="card-body bg-white text-center">

<p class="fs-5">
¿Seguro que deseas eliminar este cliente?
</p>

<hr>

<p><strong>Usuario:</strong> {{ cliente.usuario.username }}</p>
<p><strong>Plan:</strong> {{ cliente.plan.nombre }}</p>
<p><strong>Fecha fin:</strong> {{ cliente.fecha_fin }}</p>

<form method="post">
{% csrf_token %}

<button class="btn btn-danger">
🗑 Eliminar
</button>

<a href="{% url 'lista_clientes' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</div>

</div>

</body>
