<!DOCTYPE html>
{% load formato_cop %}
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; }

        h1 {
            text-align: center;
        }

        .info {
            text-align: right;
            font-size: 12px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #111;
            color: white;
            padding: 6px;
            font-size: 12px;
        }

        td {
            border: 1px solid black;
            padding: 5px;
            font-size: 11px;
            text-align: center;
        }

        .total {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>💵 Reporte de Ventas</h1>

<div class="info">
    Fecha: {{ now|date:"d/m/Y H:i" }}
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Total</th>
    </tr>

    {% for v in ventas %}
    <tr>
        <td>{{ v.id_venta }}</td>
        <td>{{ v.fecha }}</td>
        <td class="total">{{ v.total|cop }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
