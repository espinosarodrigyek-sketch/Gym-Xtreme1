{% include 'partials/admin_base.html' %}

<div class="main-content">
<div style="max-width:600px;margin:0 auto;">
    <div class="card-dark">
        <div class="card-dark-header" style="text-align:center;">
            {% if producto %}<i class="fas fa-edit" style="font-size:1.5rem;margin-bottom:5px;display:block;"></i>Editar Producto
            {% else %}<i class="fas fa-plus-circle" style="font-size:1.5rem;margin-bottom:5px;display:block;"></i>Nuevo Producto{% endif %}
        </div>
        <div class="card-dark-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div style="margin-bottom:18px;">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-input" value="{{ producto.nombre|default:'' }}" required>
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Descripcion</label>
                    <input type="text" name="descripcion" class="form-input" value="{{ producto.descripcion|default:'' }}">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;">
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Categoria</label>
                        <select name="categoria" class="form-input">
                            <option value="">Seleccione una categoría</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if producto.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Precio Costo (COP)</label>
                        <input type="number" name="precio_costo" class="form-input" step="100" value="{{ producto.precio_costo|default:'' }}" placeholder="Precio de compra">
                        <small style="color:#666;font-size:0.7rem;">Lo que pagas al proveedor</small>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Precio Venta (COP)</label>
                        <input type="number" name="precio_venta" class="form-input" step="100" value="{{ producto.precio_venta|default:'' }}" required>
                        <small style="color:#666;font-size:0.7rem;">Precio para el cliente</small>
                    </div>
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Stock Actual</label>
                    <input type="number" name="stock_actual" class="form-input" value="{{ producto.stock_actual|default:'' }}" required>
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Imagen</label>
                    <input type="file" name="imagen" class="form-input">
                    {% if producto and producto.imagen %}<img src="{{ producto.imagen.url }}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--rojo);margin-top:8px;">{% endif %}
                </div>
                <div style="margin-bottom:18px;">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-input">
                        <option value="activo" {% if producto.estado == 'activo' or not producto %}selected{% endif %}>Activo</option>
                        <option value="inactivo" {% if producto.estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                </div>
                <button type="submit" class="btn-gym" style="width:100%;justify-content:center;padding:14px;"><i class="fas fa-save"></i> Guardar</button>
                <a href="/productos/" style="display:block;text-align:center;color:#666;margin-top:12px;text-decoration:none;padding:12px;border:1px solid #333;border-radius:8px;">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</div>
