<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responder Devolución - Gym Xtreme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --rojo: #DC3545; --rojo-dark: #A71D2A; --negro: #111111; --negro-light: #1a1a1a; --verde: #198754; }
        body { background: var(--negro); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, var(--rojo), var(--rojo-dark)); border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; font-weight: 700; }
        .card { background: var(--negro-light); border: 1px solid #333; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .label { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .value { color: #fff; font-size: 1.1rem; margin-bottom: 15px; }
        .form-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #444; background: var(--negro); color: #fff; font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--rojo); }
        textarea.form-input { min-height: 100px; resize: vertical; }
        .btn { display: inline-block; padding: 14px 35px; border-radius: 25px; text-decoration: none; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-aprobar { background: var(--verde); color: white; }
        .btn-aprobar:hover { background: #157347; transform: scale(1.02); }
        .btn-rechazar { background: var(--rojo); color: white; }
        .btn-rechazar:hover { background: var(--rojo-dark); transform: scale(1.02); }
        .btn-cancelar { background: #6c757d; color: white; text-decoration: none; display: inline-block; padding: 14px 35px; border-radius: 25px; font-weight: 600; }
        .btn-cancelar:hover { background: #5a6268; }
        .buttons-row { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .info-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-undo-alt"></i> Responder Devolución</h1>
            <p style="margin: 10px 0 0; opacity: 0.9;">Gym Xtreme</p>
        </div>

        <div class="card">
            <div class="info-box">
                <span class="label">Producto</span>
                <p class="value">{{ devolucion.producto_nombre }}</p>
                <span class="label">Cantidad</span>
                <p class="value">{{ devolucion.cantidad }} unidad(es)</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <label class="label">Explique el motivo de su respuesta *</label>
                <textarea name="motivo" class="form-input" placeholder="{% if accion == 'aprobar' %}Ej: Aceptamos la devolución porque el producto llegó dañado...{% else %}Ej: No podemos aceitar porque el producto ya fue usado...{% endif %}" required></textarea>

                <div class="buttons-row">
                    {% if accion == 'aprobar' %}
                    <button type="submit" class="btn btn-aprobar">
                        <i class="fas fa-check"></i> Confirmar Aprobación
                    </button>
                    {% else %}
                    <button type="submit" class="btn btn-rechazar">
                        <i class="fas fa-times"></i> Confirmar Rechazo
                    </button>
                    {% endif %}
                    <a href="/proveedores/devolucion/{{ devolucion.token }}/ver/" class="btn-cancelar">
                        <i class="fas fa-arrow-left"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>

        <div class="card" style="text-align: center;">
            <p style="color: #888; margin: 0; font-size: 0.9rem;">
                <i class="fas fa-lock"></i> Al responder, el estado de la devolución se actualizará automáticamente en el sistema.
            </p>
        </div>
    </div>
</body>
</html>
